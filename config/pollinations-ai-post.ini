[Service]
Name=Pollinations AI - Post
Order=6
AutoSwapLanguage=1
ColorRecent=9465904
ValueType=Language

RealTimeTranslation=0
TranslateOnlyByButton=0
Visible=1

[Service Description]
0=Pollinations AI – Post — this configuration sends a POST request to Pollinations AI text endpoint, which provides access to AI language models through a simplified OpenAI-compatible API format. The request includes a prompt instructing the model to translate text from the source language to the target language while preserving formatting such as line breaks and word wrapping. The response is returned in a structure similar to chat-based AI APIs.
1=
2=Legal note: Pollinations AI provides public endpoints for free access, mainly intended for testing, experimentation, and low-frequency personal use. These services are community-driven and do not guarantee stability, availability, or consistent behavior. For normal interactive use (manual translation requests), this configuration is generally acceptable.
3=
4=There is no guarantee which exact model is used behind the service, and behavior may change without notice. High-volume, automated, or commercial usage may be restricted or unreliable.
5=
6=The user is responsible for how this configuration is used. If you need a stable, production-ready, or commercial solution, it is recommended to use official APIs from established providers that offer authentication, usage limits, and clear terms of service.

[Request]
Method=POST
EncryptText=1
UserAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36
EncodeText=0
Url=https://text.pollinations.ai/openai
ContentType=application/json
PostData={\r\n    "model": "openai",\r\n    "messages": [\r\n      {"role": "system", "content": "{prompt}"},\r\n      {"role": "user", "content": "{data}"}\r\n    ],\r\n    "temperature": 0.3\r\n}
Accept=*/*
MaxLength=0

[Response]
JsonPointer=/choices/0/message/content;/error

[Headers]
Connection=keep-alive

[Parameters]
EncodeCustomParameters=0

[Custom Parameters]
prompt=Translate from {source} language to {target} language. Return only the translated text. Preserve line breaks and word wrapping in the output. Add a period at the end only if it was present in the original text. If it is impossible to translate the text, simply return the original text.
data=Text to translate: {text}

