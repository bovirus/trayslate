Visible=1

[Service Description]
0=Simply Translate – Google — this configuration uses the public instance of SimplyTranslate to perform translations via the Google engine. The request is sent to simplytranslate.org, which acts as a proxy frontend and returns translated text in JSON format. This allows access to Google Translate results without directly calling official Google APIs.
1=
2=Legal note: SimplyTranslate itself is an alternative frontend and is not an official service of Google. While using such public instances for low-frequency, personal applications (like a desktop translator with user-triggered requests) is generally tolerated, it may rely on unofficial methods of accessing translation engines. This means that behavior and availability are not guaranteed and may change at any time.
3=
4=For normal interactive use (manual text input, low request rate), this configuration is typically acceptable. However, automated, high-volume, or commercial usage may violate the terms of the underlying translation provider.
5=
6=The user is responsible for how this configuration is used and for complying with any applicable terms of service. If you need a stable, fully compliant, or commercial solution, it is recommended to use the official Google Cloud Translation API:
7=
8=https://cloud.google.com/translate
9=
10=Using an official API provides better reliability, clear usage limits, and proper licensing.

[Request]
Method=GET
UserAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:148.0) Gecko/20100101 Firefox/148.0
EncodeText=1
Url=https://simplytranslate.org/api/translate?engine=google&from={source}&to={target}&text={text}
Accept=application/json
MaxLength=3700

[Headers]
Connection=keep-alive

[Response]
JsonPointer=/translated_text

[Parameters]
EncodeCustomParameters=1

